<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Performance Predictor</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>🎓 Student Performance Predictor</h1>
            <p>Predict exam scores using machine learning</p>
        </header>

        <form id="predictionForm">
            <!-- Study Habits Section -->
            <div class="section">
                <h2>📚 Study Habits</h2>
                <div class="form-row">
                    <div class="form-group">
                        <label>Hours Studied (per week)</label>
                        <input type="number" id="hours_studied" value="20" min="0" max="50">
                    </div>
                    <div class="form-group">
                        <label>Attendance (%)</label>
                        <input type="number" id="attendance" value="85" min="0" max="100">
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>Sleep Hours (per night)</label>
                        <input type="number" id="sleep_hours" value="7" min="0" max="12" step="0.5">
                    </div>
                    <div class="form-group">
                        <label>Previous Scores</label>
                        <input type="number" id="previous_scores" value="75" min="40" max="100">
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>Tutoring Sessions (per week)</label>
                        <input type="number" id="tutoring_sessions" value="2" min="0" max="10">
                    </div>
                    <div class="form-group">
                        <label>Physical Activity (hours/week)</label>
                        <input type="number" id="physical_activity" value="3" min="0" max="15">
                    </div>
                </div>
            </div>

            <!-- Personal Info Section -->
            <div class="section">
                <h2>👤 Personal Information</h2>
                <div class="form-row">
                    <div class="form-group">
                        <label>Parental Involvement</label>
                        <select id="parental_involvement">
                            <option value="Low">Low</option>
                            <option value="Medium" selected>Medium</option>
                            <option value="High">High</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Access to Resources</label>
                        <select id="access_to_resources">
                            <option value="Low">Low</option>
                            <option value="Medium" selected>Medium</option>
                            <option value="High">High</option>
                        </select>
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>Motivation Level</label>
                        <select id="motivation_level">
                            <option value="Low">Low</option>
                            <option value="Medium" selected>Medium</option>
                            <option value="High">High</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Family Income</label>
                        <select id="family_income">
                            <option value="Low">Low</option>
                            <option value="Medium" selected>Medium</option>
                            <option value="High">High</option>
                        </select>
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>Parental Education</label>
                        <select id="parental_education">
                            <option value="High School">High School</option>
                            <option value="College" selected>College</option>
                            <option value="Postgraduate">Postgraduate</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Distance from Home</label>
                        <select id="distance_from_home">
                            <option value="Near" selected>Near</option>
                            <option value="Moderate">Moderate</option>
                            <option value="Far">Far</option>
                        </select>
                    </div>
                </div>
            </div>

            <!-- School Info Section -->
            <div class="section">
                <h2>🏫 School Information</h2>
                <div class="form-row">
                    <div class="form-group">
                        <label>Teacher Quality</label>
                        <select id="teacher_quality">
                            <option value="Low">Low</option>
                            <option value="Medium" selected>Medium</option>
                            <option value="High">High</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>School Type</label>
                        <select id="school_type">
                            <option value="Public" selected>Public</option>
                            <option value="Private">Private</option>
                        </select>
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>Peer Influence</label>
                        <select id="peer_influence">
                            <option value="Negative">Negative</option>
                            <option value="Neutral" selected>Neutral</option>
                            <option value="Positive">Positive</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Internet Access</label>
                        <select id="internet_access">
                            <option value="No">No</option>
                            <option value="Yes" selected>Yes</option>
                        </select>
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>Extracurricular Activities</label>
                        <select id="extracurricular">
                            <option value="No" selected>No</option>
                            <option value="Yes">Yes</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Learning Disabilities</label>
                        <select id="learning_disabilities">
                            <option value="No" selected>No</option>
                            <option value="Yes">Yes</option>
                        </select>
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>Gender</label>
                        <select id="gender">
                            <option value="Male" selected>Male</option>
                            <option value="Female">Female</option>
                        </select>
                    </div>
                </div>
            </div>

            <button type="submit" id="predictBtn">🔮 Predict Exam Score</button>
        </form>

        <div id="result" class="result">
            <h3>📊 Prediction Result</h3>
            <div class="prediction-value" id="predictionValue">--</div>
            <div class="grade" id="grade"></div>
            <div class="note">This prediction is based on a machine learning model trained on student performance data.</div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
